services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oco_cms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oco_cms"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: http://localhost:8081
      FRONTEND_URL: http://localhost:8081
      PUBLIC_ROOT: /app/public
      DATABASE_URL: postgresql://postgres:postgres@db:5432/oco_cms?schema=public
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:?DEFAULT_ADMIN_EMAIL is required}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD is required}
      PRIVATE_PAGE_DEFAULT_USERNAME: ${PRIVATE_PAGE_DEFAULT_USERNAME:?PRIVATE_PAGE_DEFAULT_USERNAME is required}
      PRIVATE_PAGE_DEFAULT_PASSWORD: ${PRIVATE_PAGE_DEFAULT_PASSWORD:?PRIVATE_PAGE_DEFAULT_PASSWORD is required}
      COOKIE_DOMAIN: localhost
    command: ["sh", "-c", "npm run prisma:push && npm run prisma:seed"]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: http://localhost:8081
      FRONTEND_URL: http://localhost:8081
      PUBLIC_ROOT: /app/public
      DATABASE_URL: postgresql://postgres:postgres@db:5432/oco_cms?schema=public
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:?DEFAULT_ADMIN_EMAIL is required}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD is required}
      PRIVATE_PAGE_DEFAULT_USERNAME: ${PRIVATE_PAGE_DEFAULT_USERNAME:?PRIVATE_PAGE_DEFAULT_USERNAME is required}
      PRIVATE_PAGE_DEFAULT_PASSWORD: ${PRIVATE_PAGE_DEFAULT_PASSWORD:?PRIVATE_PAGE_DEFAULT_PASSWORD is required}
      COOKIE_DOMAIN: localhost
      MEDIA_BASE_URL: http://localhost:8081/uploads
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/backend/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  postgres_data:
  backend_uploads:
