server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers for public frontend delivery.
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://code.jquery.com https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com https://www.gstatic.com; script-src-attr 'none'; connect-src 'self' http://localhost:4000 https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://www.google.com https://www.gstatic.com; frame-src 'self' https://www.google.com https://www.gstatic.com; upgrade-insecure-requests" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Emit HSTS only when this nginx is accessed over TLS.
  set $sts_header "";
  if ($https = on) {
    set $sts_header "max-age=31536000; includeSubDomains";
  }
  if ($http_x_forwarded_proto = "https") {
    set $sts_header "max-age=31536000; includeSubDomains";
  }
  add_header Strict-Transport-Security $sts_header always;

  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /admin/ {
    proxy_pass http://backend:4000/admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /admin {
    return 301 $scheme://$http_host/admin/;
  }

  # Canonical private-route ownership.
  # `partner-access.html` is the owned destination; briefing-room remains an alias.
  location = /briefing-room.html {
    return 301 $scheme://$http_host/partner-access.html;
  }

  location /uploads/ {
    proxy_pass http://backend:4000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /admin-assets/ {
    proxy_pass http://backend:4000/admin-assets/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
